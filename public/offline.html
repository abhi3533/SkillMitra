<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMitra — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; background: #f8fafc; color: #0f172a; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .container { max-width: 400px; }
    .logo { font-size: 28px; font-weight: 800; margin-bottom: 32px; }
    .logo .blue { color: #1A56DB; }
    .icon { width: 80px; height: 80px; margin: 0 auto 24px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 40px; height: 40px; color: #64748b; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; margin-bottom: 32px; font-size: 16px; }
    button { background: #1A56DB; color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; min-height: 44px; }
    button:active { background: #1035A8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>Skill</span><span class="blue">Mitra</span></div>
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
